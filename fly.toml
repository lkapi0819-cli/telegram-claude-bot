  # fly.toml - Fly.io 配置文件                                                                                                                
                                                                                                                                              
  app = "telegram-claude-bot"                                                                                                                 
  primary_region = "sjc"                                                                                                                      
                                                                                                                                              
  [build]                                                                                                                                     
    builder = "HEROKU_FILESYSTEM"                                                                                                             
                                                                                                                                              
  [env]                                                                                                                                       
    PORT = "8080"                                                                                                                             
                                                                                                                                              
  [processes]                                                                                                                                 
    app = "python telegram_claude_bot_advanced.py"                                                                                            
                                                                                                                                              
  [[vm]]                                                                                                                                      
    cpu_kind = "shared"                                                                                                                       
    cpus = 1                                                                                                                                  
    memory_mb = 256     
